<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>401 Unauthorized - Tourwow</title>
    <link rel="stylesheet" href="shared-font.css" />
    <script src="shared-font.js"></script>
    <style>
      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f5f7fb;
        font-family: var(--font-family, "Sarabun", sans-serif);
        color: #1f2937;
      }

      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 16px;
        max-width: 520px;
        width: 100%;
      }

      .empty-icon {
        width: 240px;
        height: 240px;
        object-fit: contain;
      }

      .empty-state h3 {
        font-size: 20px;
        font-weight: 600;
        color: #1f2937;
        margin: 0;
      }

      .empty-state p {
        font-size: 15px;
        color: #6b7280;
        margin: 0;
        line-height: 1.6;
      }

      .empty-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 8px;
      }

      .empty-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 28px;
        border-radius: 10px;
        background: #4a7ba7;
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        text-decoration: none;
        box-shadow: 0 8px 20px rgba(74, 123, 167, 0.22);
        transition: background 0.18s ease, transform 0.18s ease;
      }

      .empty-btn:hover {
        background: #365d80;
        transform: translateY(-1px);
      }

      .empty-btn-secondary {
        background: #fff;
        color: #365d80;
        border: 1px solid #cbd5e1;
        box-shadow: none;
      }

      .empty-btn-secondary:hover {
        background: #eff6ff;
      }

      @media (max-width: 520px) {
        .empty-icon {
          width: 180px;
          height: 180px;
        }

        .empty-state h3 {
          font-size: 18px;
        }

        .empty-state p {
          font-size: 14px;
        }

        .empty-actions {
          width: 100%;
        }

        .empty-btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="empty-state" role="status">
      <img src="/assets/images/401-error-unauthorized.svg" alt="401 Unauthorized" class="empty-icon" />
      <h3>401 Unauthorized</h3>
      <p>คุณยังไม่มีสิทธิ์เข้าใช้งานหน้านี้ กรุณาเข้าสู่ระบบใหม่ หรือกลับไปยังหน้าแรกของระบบ</p>
      <div class="empty-actions">
        <a class="empty-btn" href="https://financebackoffice.tourwow.com/login">เข้าสู่ระบบใหม่</a>
        <a class="empty-btn empty-btn-secondary" href="/dashboard">กลับไปที่หน้าหลัก</a>
      </div>
    </main>
  </body>
</html>
