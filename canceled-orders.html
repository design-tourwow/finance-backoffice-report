<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Canceled Orders Report - Tourwow" />
    <title>Canceled Orders Report - Tourwow</title>

    <!-- Fonts -->
    <link rel="stylesheet" href="shared-font.css" />

    <!-- Styles — reuse the commission-report-plus stylesheet so this page
         inherits the same summary cards, seller summary, and table styling. -->
    <link rel="stylesheet" href="tour-image-manager.css" />
    <link rel="stylesheet" href="shared-export-button.css" />
    <link rel="stylesheet" href="filter-panel.css" />
    <link rel="stylesheet" href="kpi-card.css" />
    <link rel="stylesheet" href="dashboard-table.css" />
    <link rel="stylesheet" href="shared-table-search.css" />
    <link rel="stylesheet" href="shared-filter-actions.css" />
    <link rel="stylesheet" href="filter-sort-dropdown-component.css" />
    <link rel="stylesheet" href="date-picker-component.css" />
    <link rel="stylesheet" href="commission-report-plus.css" />

    <!-- Configuration -->
    <script>
      (function() {
        const hostname = window.location.hostname
        if (hostname === 'staging-finance-backoffice-report.vercel.app') {
          window.API_BASE_URL = 'https://staging-finance-backoffice-report-api.vercel.app'
          window.ENVIRONMENT = 'staging'
        } else if (hostname === 'finance-backoffice-report.vercel.app') {
          window.API_BASE_URL = 'https://finance-backoffice-report-api.vercel.app'
          window.ENVIRONMENT = 'production'
        } else {
          const sessionEnv = sessionStorage.getItem('env') || 'staging'
          window.ENVIRONMENT = sessionEnv
          window.API_BASE_URL = sessionEnv === 'staging'
            ? 'https://staging-finance-backoffice-report-api.vercel.app'
            : 'https://finance-backoffice-report-api.vercel.app'
        }
      })()
    </script>
    <script src="shared-font.js"></script>
    <script src="token-utils.js?v=20250128"></script>
    <script src="tour-image-manager-api.js"></script>
    <!-- Reuse the commission-plus API client — canceled-orders hits the
         same /api/reports/commission-plus endpoint, just with
         order_status=canceled and canceled_at_from/to. -->
    <script src="commission-report-plus-api.js"></script>
    <script src="filter-sort-dropdown-component.js"></script>
    <script src="filter-search-dropdown-component.js"></script>
    <script src="date-picker-component.js"></script>
    <script src="shared-utils.js"></script>
    <script src="shared-period-selector.js"></script>
    <script src="shared-sortable-header.js"></script>
    <script src="shared-export-button.js"></script>
    <script src="shared-table-search.js"></script>
    <script src="shared-filter-actions.js"></script>
    <script src="menu-component.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

    <!-- Load sidebar state -->
    <script>
      (function() {
        if (localStorage.getItem('sidebar-collapsed') === 'true') {
          document.documentElement.classList.add('sidebar-collapsed-init')
        }
      })()
    </script>
    <style>
      .sidebar-collapsed-init .app-wrapper { margin-left: 0 !important; }
      .sidebar-collapsed-init .sidebar { width: 0 !important; overflow: hidden !important; border-right: none !important; }
      .sidebar-collapsed-init .main-content { margin-left: 0 !important; }
    </style>
    <style>
      @media print {
        @page { size: A4 landscape; margin: 10mm; }

        .sidebar, .top-bar, .mobile-menu-toggle,
        .breadcrumb, .page-header,
        .filter-wrap,
        #crp-summary,
        .dashboard-table-actions,
        .skip-link { display: none !important; }

        .app-wrapper, .main-content { display: block !important; margin: 0 !important; padding: 0 !important; }
        .content-area { padding: 0 !important; background: white !important; }
        .report-content-section { box-shadow: none !important; border-radius: 0 !important; padding: 0 !important; }
        .crp-wrapper { gap: 0 !important; }

        .crp-table-scroll { overflow: visible !important; max-height: none !important; }
        .dashboard-table { width: 100% !important; font-size: 10pt !important; }
        .dashboard-table thead th { padding: 5px 6px !important; font-size: 10pt !important; }
        .dashboard-table tbody td { padding: 4px 6px !important; }

        .crp-table thead tr.group-row th,
        .crp-table thead tr.col-row th { position: static !important; }
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">ข้ามไปยังเนื้อหาหลัก</a>

    <div class="app-wrapper">
      <button class="mobile-menu-toggle" aria-label="เปิด/ปิดเมนู" aria-expanded="false">
        <span class="hamburger-icon"><span></span><span></span><span></span></span>
      </button>

      <aside class="sidebar" id="sidebar" role="navigation" aria-label="เมนูหลัก">
        <div class="logo">
          <img src="https://financebackoffice-staging2.tourwow.com/assets/images/tourwow-logo.png" alt="Tourwow Logo" />
        </div>
        <nav class="nav-menu"><!-- Menu will be rendered by menu-component.js --></nav>
        <button class="sidebar-toggle-btn" id="sidebarToggle" aria-label="ซ่อนเมนู" title="ซ่อนเมนู">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
          <span>ซ่อนเมนู</span>
        </button>
      </aside>

      <main class="main-content" id="main-content" role="main">
        <nav class="top-bar" role="banner">
          <div class="top-bar-container">
            <ul class="navbar-list"><!-- Menu will be rendered by menu-component.js --></ul>
          </div>
        </nav>

        <div class="content-area">
          <nav class="breadcrumb" aria-label="breadcrumb">
            <ol>
              <li><a href="#">หน้าแรก</a></li>
              <li><a href="#">Report</a></li>
              <li aria-current="page">Canceled Orders Report</li>
            </ol>
          </nav>

          <header class="page-header">
            <svg class="page-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
              <line x1="15" y1="9" x2="9" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="9" y1="9" x2="15" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <h1>Canceled Orders Report</h1>
          </header>

          <section class="report-content-section" id="reportContentSection">
            <!-- Dashboard will be rendered here by JavaScript -->
          </section>
        </div>
      </main>
    </div>

    <script src="canceled-orders.js"></script>
  </body>
</html>
