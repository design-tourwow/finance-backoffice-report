<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sales by Country - รายงานยอดขายตามประเทศ Tourwow" />
    <!-- Cache Buster: v1.0.8 - 2026-01-30 Production -->
    <title>รายงานตามประเทศ - Tourwow</title>
    
    <!-- Fonts -->
    <link rel="stylesheet" href="shared-font.css" />
    
    <!-- Styles -->
    <link rel="stylesheet" href="tour-image-manager.css?v=1777001072" />
    <link rel="stylesheet" href="filter-panel.css?v=1777001072" />
    <link rel="stylesheet" href="kpi-card.css" />
    <link rel="stylesheet" href="date-picker-component.css" />
    <link rel="stylesheet" href="searchable-dropdown-component.css" />
    <link rel="stylesheet" href="table-sorting-component.css" />
    <link rel="stylesheet" href="filter-sort-dropdown-component.css" />
    <link rel="stylesheet" href="sales-by-country.css?v=1777001072" />
    <link rel="stylesheet" href="shared-export-button.css" />
    <link rel="stylesheet" href="shared-table-search.css" />
    <link rel="stylesheet" href="shared-filter-actions.css" />

    <!-- Configuration -->
    <script>
      (function() {
        const hostname = window.location.hostname;
        
        if (hostname === 'staging-finance-backoffice-report.vercel.app') {
          window.API_BASE_URL = 'https://staging-finance-backoffice-report-api.vercel.app';
          window.ENVIRONMENT = 'staging';
          console.log('🎯 STAGING Environment - API:', window.API_BASE_URL);
        } else if (hostname === 'finance-backoffice-report.vercel.app') {
          window.API_BASE_URL = 'https://finance-backoffice-report-api.vercel.app';
          window.ENVIRONMENT = 'production';
          console.log('🎯 PRODUCTION Environment - API:', window.API_BASE_URL);
        } else {
          const sessionEnv = sessionStorage.getItem('env') || 'staging';
          window.ENVIRONMENT = sessionEnv;
          window.API_BASE_URL = sessionEnv === 'staging' 
            ? 'https://staging-finance-backoffice-report-api.vercel.app'
            : 'https://finance-backoffice-report-api.vercel.app';
          console.log('🎯 LOCALHOST Environment:', window.ENVIRONMENT, '- API:', window.API_BASE_URL);
        }
      })();
    </script>
    <script src="shared-font.js"></script>
    <script src="token-utils.js?v=20250128"></script>
    <script src="tour-image-manager-api.js"></script>
    <script src="sales-by-country-api.js"></script>
    <script src="date-picker-component.js"></script>
    <script src="searchable-dropdown-component.js"></script>
    <script src="shared-sortable-header.js"></script>
    <script src="table-sorting-component.js"></script>
    <script src="filter-sort-dropdown-component.js"></script>
    <script src="shared-export-button.js"></script>
    <script src="shared-table-search.js"></script>
    <script src="shared-filter-actions.js"></script>
    <script src="filter-search-dropdown-component.js"></script>
    <script src="country-flags.js"></script>
    <script src="shared-utils.js"></script>
    <script src="shared-period-selector.js"></script>
    <script src="menu-component.js"></script>
    
    <!-- Load sidebar state -->
    <script>
      (function() {
        const savedState = localStorage.getItem('sidebar-collapsed');
        if (savedState === 'true') {
          document.documentElement.classList.add('sidebar-collapsed-init');
        }
      })();
    </script>
    <style>
      .sidebar-collapsed-init .app-wrapper {
        margin-left: 0 !important;
      }
      .sidebar-collapsed-init .sidebar {
        width: 0 !important;
        overflow: hidden !important;
        border-right: none !important;
      }
      .sidebar-collapsed-init .main-content {
        margin-left: 0 !important;
      }
    </style>
  </head>
  <body>
    <!-- Skip to main content -->
    <a href="#main-content" class="skip-link">ข้ามไปยังเนื้อหาหลัก</a>

    <div class="app-wrapper">
      <!-- Mobile Menu Toggle -->
      <button class="mobile-menu-toggle" aria-label="เปิด/ปิดเมนู" aria-expanded="false">
        <span class="hamburger-icon">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>

      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar" role="navigation" aria-label="เมนูหลัก">
        <div class="logo">
          <img src="https://financebackoffice-staging2.tourwow.com/assets/images/tourwow-logo.png" alt="Tourwow Logo" />
        </div>
        <nav class="nav-menu">
          <!-- Menu will be rendered by menu-component.js -->
        </nav>
        <button class="sidebar-toggle-btn" id="sidebarToggle" aria-label="ซ่อนเมนู" title="ซ่อนเมนู">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
          <span>ซ่อนเมนู</span>
        </button>
      </aside>

      <!-- Main Content -->
      <main class="main-content" id="main-content" role="main">
        <!-- Top Bar -->
        <nav class="top-bar" role="banner">
          <div class="top-bar-container">
            <!-- Navigation Menu -->
            <ul class="navbar-list">
              <!-- Menu will be rendered by menu-component.js -->
            </ul>
          </div>
        </nav>

        <!-- Content Area -->
        <div class="content-area">
          <!-- Breadcrumb -->
          <nav class="breadcrumb" aria-label="breadcrumb">
            <ol>
              <li><a href="#">หน้าแรก</a></li>
              <li aria-current="page">รายงานตามประเทศ</li>
            </ol>
          </nav>

          <!-- Page Header -->
          <header class="page-header">
            <svg class="page-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
              <path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z" stroke="currentColor" stroke-width="2"/>
            </svg>
            <h1>รายงานตามประเทศ</h1>
          </header>

          <!-- Filter Section -->
          <section class="filter-section" aria-label="ฟอร์มค้นหา">
            <h2>ค้นหาข้อมูล</h2>
            <form class="filter-form" id="reportFilterForm" novalidate>
              <!-- Row 1: Country, Supplier -->
              <div class="form-row">
                <div class="form-group">
                  <label for="filterCountry">ประเทศ</label>
                  <div class="searchable-dropdown-wrapper" id="countryDropdownWrapper"></div>
                  <input type="hidden" id="filterCountry" name="country_id" value="">
                  <span class="error-message" role="alert"></span>
                </div>
                <div class="form-group">
                  <label for="filterSupplier">Supplier</label>
                  <div class="searchable-dropdown-wrapper" id="supplierDropdownWrapper"></div>
                  <input type="hidden" id="filterSupplier" name="supplier_id" value="">
                  <span class="error-message" role="alert"></span>
                </div>
              </div>

              <!-- Row 2: Travel Date (period selector — รายปี / รายไตรมาส / รายเดือน / กำหนดเอง) -->
              <div class="form-row">
                <div class="form-group form-group-period">
                  <label>วันที่เดินทาง</label>
                  <div class="filter-period-controls">
                    <div id="travelPeriodModeHost"></div>
                    <div id="travelPeriodValueHost"></div>
                  </div>
                  <span class="error-message" role="alert"></span>
                </div>
              </div>

              <!-- Row 3: Booking Date (period selector) -->
              <div class="form-row">
                <div class="form-group form-group-period">
                  <label>วันที่จอง</label>
                  <div class="filter-period-controls">
                    <div id="bookingPeriodModeHost"></div>
                    <div id="bookingPeriodValueHost"></div>
                  </div>
                  <span class="error-message" role="alert"></span>
                </div>
              </div>

              <!-- Row 3: Buttons — SharedFilterActions mounts ค้นหา +
                   เริ่มใหม่ here (searchType=submit / resetType=reset so
                   the existing form.addEventListener flow is preserved). -->
              <div class="form-row form-row-actions">
                <div class="form-actions" id="sbcFilterActionsHost"></div>
              </div>
            </form>
          </section>

          <!-- Report Content Section (No Tabs) -->
          <section class="report-content-section" id="reportContentSection">
            <!-- Dashboard will be rendered here by JavaScript -->
          </section>
        </div>
      </main>
    </div>

    <!-- Chart.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <script src="chart-defaults.js"></script>
    <script src="sales-by-country.js"></script>
  </body>
</html>
