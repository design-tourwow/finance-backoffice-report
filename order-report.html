<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Order Report - รายงานคำสั่งซื้อ Tourwow" />
    <!-- Cache Buster: v1.0.6 - 2025-01-16 -->
    <title>Order Report - Tourwow</title>
    
    <!-- Fonts -->
    <link rel="stylesheet" href="shared-font.css" />
    
    <!-- Styles -->
    <link rel="stylesheet" href="tour-image-manager.css?v=1777003205" />
    <link rel="stylesheet" href="filter-panel.css?v=1777003205" />
    <link rel="stylesheet" href="date-picker-component.css" />
    <link rel="stylesheet" href="table-sorting-component.css" />
    <link rel="stylesheet" href="filter-sort-dropdown-component.css" />
    <link rel="stylesheet" href="order-report.css?v=1777003205" />
    <link rel="stylesheet" href="shared-export-button.css" />
    <link rel="stylesheet" href="shared-table-search.css" />
    <link rel="stylesheet" href="shared-filter-actions.css" />

    <!-- Configuration -->
    <script>
      (function() {
        const hostname = window.location.hostname;
        
        if (hostname === 'staging-finance-backoffice-report.vercel.app') {
          window.API_BASE_URL = 'https://staging-finance-backoffice-report-api.vercel.app';
          window.ENVIRONMENT = 'staging';
          console.log('🎯 STAGING Environment - API:', window.API_BASE_URL);
        } else if (hostname === 'finance-backoffice-report.vercel.app') {
          window.API_BASE_URL = 'https://finance-backoffice-report-api.vercel.app';
          window.ENVIRONMENT = 'production';
          console.log('🎯 PRODUCTION Environment - API:', window.API_BASE_URL);
        } else {
          const sessionEnv = sessionStorage.getItem('env') || 'staging';
          window.ENVIRONMENT = sessionEnv;
          window.API_BASE_URL = sessionEnv === 'staging' 
            ? 'https://staging-finance-backoffice-report-api.vercel.app'
            : 'https://finance-backoffice-report-api.vercel.app';
          console.log('🎯 LOCALHOST Environment:', window.ENVIRONMENT, '- API:', window.API_BASE_URL);
        }
        window.REPORT_API_BASE_URL = window.API_BASE_URL;
      })();
    </script>
    <script src="shared-font.js"></script>
    <script src="token-utils.js?v=20250128"></script>
    <script src="tour-image-manager-api.js"></script>
    <script src="order-report-api.js"></script>
    <script src="date-picker-component.js"></script>
    <script src="filter-search-dropdown-component.js"></script>
    <script src="shared-utils.js"></script>
    <script src="shared-http.js"></script>
    <script src="shared-filter-service.js"></script>
    <script src="country-flags.js"></script>
    <script src="shared-sortable-header.js"></script>
    <script src="table-sorting-component.js"></script>
    <script src="filter-sort-dropdown-component.js"></script>
    <script src="shared-period-selector.js?v=20260427o"></script>
    <script src="shared-export-button.js"></script>
    <script src="shared-table-search.js"></script>
    <script src="shared-filter-actions.js"></script>
    <script src="menu-component.js"></script>
    
    <!-- Load sidebar state -->
    <script>
      (function() {
        const savedState = localStorage.getItem('sidebar-collapsed');
        if (savedState === 'true') {
          document.documentElement.classList.add('sidebar-collapsed-init');
        }
      })();
    </script>
    <style>
      .sidebar-collapsed-init .app-wrapper {
        margin-left: 0 !important;
      }
      .sidebar-collapsed-init .sidebar {
        width: 0 !important;
        overflow: hidden !important;
        border-right: none !important;
      }
      .sidebar-collapsed-init .main-content {
        margin-left: 0 !important;
      }
    </style>
  </head>
  <body>
    <!-- Skip to main content -->
    <a href="#main-content" class="skip-link">ข้ามไปยังเนื้อหาหลัก</a>

    <div class="app-wrapper">
      <!-- Mobile Menu Toggle -->
      <button class="mobile-menu-toggle" aria-label="เปิด/ปิดเมนู" aria-expanded="false">
        <span class="hamburger-icon">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>

      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar" role="navigation" aria-label="เมนูหลัก">
        <div class="logo">
          <img src="https://financebackoffice-staging2.tourwow.com/assets/images/tourwow-logo.png" alt="Tourwow Logo" />
        </div>
        <nav class="nav-menu">
          <!-- Menu will be rendered by menu-component.js -->
        </nav>
        <button class="sidebar-toggle-btn" id="sidebarToggle" aria-label="ซ่อนเมนู" title="ซ่อนเมนู">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
          <span>ซ่อนเมนู</span>
        </button>
      </aside>

      <!-- Main Content -->
      <main class="main-content" id="main-content" role="main">
        <!-- Top Bar -->
        <nav class="top-bar" role="banner">
          <div class="top-bar-container">
            <!-- Navigation Menu -->
            <ul class="navbar-list">
              <!-- Menu will be rendered by menu-component.js -->
            </ul>
          </div>
        </nav>

        <!-- Content Area -->
        <div class="content-area">
          <!-- Breadcrumb -->
          <nav class="breadcrumb" aria-label="breadcrumb">
            <ol>
              <li><a href="#">หน้าแรก</a></li>
              <li aria-current="page">Order Report</li>
            </ol>
          </nav>

          <!-- Page Header -->
          <header class="page-header">
            <svg class="page-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h1>Order Report</h1>
          </header>

          <!-- Filter Section -->
          <section class="filter-section" aria-label="ฟอร์มค้นหา">
            <h2>ค้นหาข้อมูล</h2>
            <form class="filter-form" id="reportFilterForm" novalidate>
              <!-- Row 1: Country, Supplier -->
              <div class="form-row">
                <div class="form-group">
                  <label for="filterCountry">ประเทศ</label>
                  <div class="searchable-dropdown-wrapper" id="countryDropdownWrapper"></div>
                  <input type="hidden" id="filterCountry" name="country_id" value="">
                  <span class="error-message" role="alert"></span>
                </div>
                <div class="form-group">
                  <label for="filterSupplier">Supplier</label>
                  <div class="searchable-dropdown-wrapper" id="supplierDropdownWrapper"></div>
                  <input type="hidden" id="filterSupplier" name="supplier_id" value="">
                  <span class="error-message" role="alert"></span>
                </div>
              </div>

              <!-- Row 2: Travel Date (period selector — รายปี / รายไตรมาส / รายเดือน / กำหนดเอง) -->
              <div class="form-row">
                <div class="form-group form-group-period">
                  <label>วันที่เดินทาง</label>
                  <div class="filter-period-controls">
                    <div id="travelPeriodModeHost"></div>
                    <div id="travelPeriodValueHost"></div>
                  </div>
                  <span class="error-message" role="alert"></span>
                </div>
              </div>

              <!-- Row 3: Booking Date (period selector) -->
              <div class="form-row">
                <div class="form-group form-group-period">
                  <label>วันที่จอง</label>
                  <div class="filter-period-controls">
                    <div id="bookingPeriodModeHost"></div>
                    <div id="bookingPeriodValueHost"></div>
                  </div>
                  <span class="error-message" role="alert"></span>
                </div>
              </div>

              <!-- Row 3: Buttons — SharedFilterActions mounts ค้นหา +
                   เริ่มใหม่ here (searchType=submit / resetType=reset). -->
              <div class="form-row form-row-actions">
                <div class="form-actions" id="orFilterActionsHost"></div>
              </div>
            </form>
          </section>

          <!-- Summary Cards -->
          <section class="summary-cards" aria-label="สรุปข้อมูล">
            <div class="summary-card">
              <div class="summary-card-icon" style="background: #e3f2fd;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1976d2" stroke-width="2">
                  <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
              </div>
              <div class="summary-card-content">
                <div class="summary-card-label">จำนวน Orders</div>
                <div class="summary-card-value" id="summaryTotalOrders">-</div>
              </div>
            </div>

            <div class="summary-card">
              <div class="summary-card-icon" style="background: #f3e5f5;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#7b1fa2" stroke-width="2">
                  <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
                </svg>
              </div>
              <div class="summary-card-content">
                <div class="summary-card-label">จำนวนลูกค้า</div>
                <div class="summary-card-value" id="summaryTotalCustomers">-</div>
              </div>
            </div>

            <div class="summary-card">
              <div class="summary-card-icon" style="background: #e8f5e9;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#388e3c" stroke-width="2">
                  <path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
                </svg>
              </div>
              <div class="summary-card-content">
                <div class="summary-card-label">ยอดรวม (Net Amount)</div>
                <div class="summary-card-value" id="summaryTotalAmount">-</div>
              </div>
            </div>

            <div class="summary-card">
              <div class="summary-card-icon" style="background: #fff3e0;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f57c00" stroke-width="2">
                  <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
              </div>
              <div class="summary-card-content">
                <div class="summary-card-label">ค่าเฉลี่ย/Order</div>
                <div class="summary-card-value" id="summaryAvgAmount">-</div>
              </div>
            </div>
          </section>

          <!-- Tabs Section -->
          <section class="report-tabs-section">
            <div class="report-tabs">
              <button class="report-tab active" data-tab="country">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/>
                  <path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
                </svg>
                ตามประเทศ
              </button>
              <button class="report-tab" data-tab="supplier">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                  <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                ตาม Supplier
              </button>
              <button class="report-tab" data-tab="travel-date">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                  <line x1="16" y1="2" x2="16" y2="6"/>
                  <line x1="8" y1="2" x2="8" y2="6"/>
                  <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                ตามวันเดินทาง
              </button>
              <button class="report-tab" data-tab="booking-date">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                  <line x1="16" y1="2" x2="16" y2="6"/>
                  <line x1="8" y1="2" x2="8" y2="6"/>
                  <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                ตามวันจอง
              </button>
              <button class="report-tab" data-tab="lead-time">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/>
                  <polyline points="12 6 12 12 16 14"/>
                </svg>
                ช่วงเวลาจอง
              </button>
            </div>

            <!-- Tab Content -->
            <div class="report-tab-content">
              <!-- Loading State -->
              <div class="loading-state" style="display: none;">
                <div class="spinner"></div>
                <p>กำลังโหลดข้อมูล...</p>
              </div>

              <!-- Empty State -->
              <div class="empty-state" style="display: none;">
                <div class="empty-state-content">
                  <div class="empty-icon-wrapper">
                    <img src="/assets/images/empty-state.svg" alt="ไม่พบข้อมูล" class="empty-icon" width="240" height="240" />
                  </div>
                  <div class="empty-text">
                    <h3>ไม่พบข้อมูล</h3>
                    <p>ลองปรับเงื่อนไขการค้นหาใหม่</p>
                  </div>
                </div>
              </div>

              <!-- Chart Container -->
              <div class="chart-container" id="chartContainer" style="display: none;">
                <div class="chart-wrapper">
                  <canvas id="reportChart"></canvas>
                </div>
              </div>

              <!-- Table Container -->
              <div class="table-container" id="tableContainer" style="display: none;">
                <!-- Table Search & Filters -->
                <div class="table-search-wrapper">
                  <!-- Shared SharedTableSearch renders input + icon + clear button into this host -->
                  <div id="or-table-search-host"></div>

                  <!-- Filter Dropdown (dynamic for each tab) -->
                  <div id="tabFilterContainer"></div>
                  
                  <!-- Export Button -->
                  <div id="exportCsvBtnHost" class="shared-export-button-host"></div>
                </div>
                
                <!-- Search Results (below search bar) -->
                <div class="table-search-results" id="tableSearchResults" style="display: none;">
                  <span class="results-text">พบ <strong id="searchResultCount">0</strong> รายการ</span>
                </div>
                
                <table class="report-table" id="reportTable">
                  <thead id="reportTableHead"></thead>
                  <tbody id="reportTableBody"></tbody>
                </table>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <!-- Chart.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <script src="chart-defaults.js"></script>
    <script src="order-report.js"></script>
  </body>
</html>
